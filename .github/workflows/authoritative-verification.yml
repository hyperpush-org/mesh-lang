name: Authoritative verification

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  whitespace-guard:
    name: Whitespace guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify incoming diff is whitespace-clean
        shell: bash
        run: |
          set -euo pipefail

          case "${{ github.event_name }}" in
            pull_request)
              range="${{ github.event.pull_request.base.sha }}...HEAD"
              ;;
            push)
              if [[ "${{ github.event.before }}" == "0000000000000000000000000000000000000000" ]]; then
                range="HEAD^..HEAD"
              else
                range="${{ github.event.before }}..HEAD"
              fi
              ;;
            *)
              range="HEAD^..HEAD"
              ;;
          esac

          bash scripts/verify-whitespace.sh --diff-range "$range"

  rust-core:
    name: Rust core build and smoke
    runs-on: ubuntu-24.04
    timeout-minutes: 75
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache LLVM
        uses: actions/cache@v4
        id: cache-llvm
        with:
          path: ~/llvm
          key: llvm-21.1.8-v4-x86_64-unknown-linux-gnu

      - name: Install LLVM 21 (Linux x86_64)
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: |
          LLVM_VERSION="21.1.8"
          LLVM_ARCHIVE="LLVM-${LLVM_VERSION}-Linux-X64.tar.xz"
          LLVM_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/${LLVM_ARCHIVE}"
          curl -sSfL "$LLVM_URL" -o llvm.tar.xz
          mkdir -p "$HOME/llvm"
          tar xf llvm.tar.xz --strip-components=1 -C "$HOME/llvm"
          rm llvm.tar.xz

      - name: Set LLVM prefix
        shell: bash
        run: echo "LLVM_SYS_211_PREFIX=$HOME/llvm" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        timeout-minutes: 10
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: authoritative-verification-rust-core-x86_64-unknown-linux-gnu

      - name: Run core workspace tests
        shell: bash
        timeout-minutes: 45
        run: |
          cargo test -p mesh-parser --lib --locked
          cargo test -p mesh-typeck --lib --locked
          cargo test -p mesh-codegen --lib --locked
          cargo build --workspace --locked

      - name: Run clustered tiny-cluster smoke
        shell: bash
        timeout-minutes: 20
        run: |
          cargo run -q -p meshc -- build scripts/fixtures/clustered/tiny-cluster
          cargo run -q -p meshc -- test scripts/fixtures/clustered/tiny-cluster/tests

  docs-and-sites:
    name: Docs and sites build
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            website/package-lock.json
            packages-website/package-lock.json

      - name: Verify local public docs contract
        shell: bash
        run: python3 scripts/lib/m034_public_surface_contract.py local-docs --root "$GITHUB_WORKSPACE"

      - name: Build website docs
        run: |
          npm --prefix website ci
          npm --prefix website run build

      - name: Build packages website
        run: |
          npm --prefix packages-website ci
          npm --prefix packages-website run build

  vscode-extension:
    name: VS Code extension compile
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tools/editors/vscode-mesh/package-lock.json

      - name: Build extension
        run: |
          npm --prefix tools/editors/vscode-mesh ci
          npm --prefix tools/editors/vscode-mesh run compile
