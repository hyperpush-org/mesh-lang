# Publish Mesh VS Code extension to VS Code Marketplace and Open VSX
# Trigger: git tag ext-vX.Y.Z && git push origin ext-vX.Y.Z
# Requires secrets: VS_MARKETPLACE_TOKEN, OPEN_VSX_TOKEN

name: Publish Extension

on:
  push:
    tags:
      - "ext-v*"

permissions:
  contents: read

jobs:
  secrets-preflight:
    name: Verify extension publish secrets
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check marketplace secrets
        shell: bash
        env:
          OPEN_VSX_TOKEN: ${{ secrets.OPEN_VSX_TOKEN }}
          VS_MARKETPLACE_TOKEN: ${{ secrets.VS_MARKETPLACE_TOKEN }}
        run: |
          set -euo pipefail
          missing=0
          if [[ -z "$OPEN_VSX_TOKEN" ]]; then
            echo "::error title=Missing OPEN_VSX_TOKEN::publish-extension.yml runs in mesh-lang, but this repo has no OPEN_VSX_TOKEN secret. GitHub Actions secrets are repo-scoped: copy it into mesh-lang or promote it to an org secret visible to mesh-lang."
            missing=1
          fi
          if [[ -z "$VS_MARKETPLACE_TOKEN" ]]; then
            echo "::error title=Missing VS_MARKETPLACE_TOKEN::publish-extension.yml runs in mesh-lang, but this repo has no VS_MARKETPLACE_TOKEN secret. GitHub Actions secrets are repo-scoped: copy it into mesh-lang or promote it to an org secret visible to mesh-lang."
            missing=1
          fi
          exit "$missing"

  proof:
    name: Verify extension release proof
    uses: ./.github/workflows/extension-release-proof.yml

  publish:
    name: Publish verified extension
    needs:
      - proof
      - secrets-preflight
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Download verified VSIX
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.proof.outputs.verified_vsix_artifact_name }}
          path: tools/editors/vscode-mesh/dist/

      - name: Confirm verified VSIX handoff
        shell: bash
        env:
          VERIFIED_VSIX_PATH: ${{ needs.proof.outputs.verified_vsix_path }}
        run: |
          test -n "$VERIFIED_VSIX_PATH"
          test -f "$VERIFIED_VSIX_PATH"
          echo "Publishing verified VSIX: $VERIFIED_VSIX_PATH"

      - name: Publish to Open VSX Registry
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.OPEN_VSX_TOKEN }}
          extensionFile: ${{ needs.proof.outputs.verified_vsix_path }}
          skipDuplicate: true

      - name: Publish to Visual Studio Marketplace
        uses: HaaLeo/publish-vscode-extension@v2
        with:
          pat: ${{ secrets.VS_MARKETPLACE_TOKEN }}
          registryUrl: https://marketplace.visualstudio.com
          extensionFile: ${{ needs.proof.outputs.verified_vsix_path }}
          skipDuplicate: true
