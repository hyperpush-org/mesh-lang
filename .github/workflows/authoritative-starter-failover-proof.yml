name: Authoritative starter failover proof

on:
  workflow_call:

permissions:
  contents: read

jobs:
  starter-failover-proof:
    name: Authoritative starter failover proof
    runs-on: ubuntu-24.04
    timeout-minutes: 180
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: mesh_starter
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d mesh_starter"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 12
    env:
      PGHOST: 127.0.0.1
      PGPORT: 5432
      PGUSER: postgres
      PGPASSWORD: postgres
      PGDATABASE: mesh_starter

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize starter proof diagnostics
        shell: bash
        run: |
          mkdir -p .tmp/m053-s02/verify
          {
            echo "workflow=${GITHUB_WORKFLOW}"
            echo "run_id=${GITHUB_RUN_ID}"
            echo "run_attempt=${GITHUB_RUN_ATTEMPT}"
            echo "ref=${GITHUB_REF}"
            echo "sha=${GITHUB_SHA}"
            echo "runner=${RUNNER_NAME:-unknown}"
          } > .tmp/m053-s02/verify/hosted-workflow-metadata.txt

      - name: Verify starter failover proof entrypoint
        shell: bash
        run: test -f scripts/verify-m053-s02.sh

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cache LLVM
        uses: actions/cache@v4
        id: cache-llvm
        with:
          path: ~/llvm
          key: llvm-21.1.8-v3-x86_64-unknown-linux-gnu

      - name: Install LLVM 21 (Linux x86_64)
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        timeout-minutes: 10
        run: |
          LLVM_VERSION="21.1.8"
          LLVM_ARCHIVE="LLVM-${LLVM_VERSION}-Linux-X64.tar.xz"
          LLVM_URL="https://github.com/llvm/llvm-project/releases/download/llvmorg-${LLVM_VERSION}/${LLVM_ARCHIVE}"
          curl -sSfL "$LLVM_URL" -o llvm.tar.xz
          mkdir -p "$HOME/llvm"
          tar xf llvm.tar.xz --strip-components=1 -C "$HOME/llvm"
          rm llvm.tar.xz

      - name: Set LLVM prefix (Linux tarball)
        shell: bash
        run: echo "LLVM_SYS_211_PREFIX=$HOME/llvm" >> "$GITHUB_ENV"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        timeout-minutes: 10
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2
        with:
          key: authoritative-starter-failover-proof-x86_64-unknown-linux-gnu

      - name: Export runner-local DATABASE_URL
        shell: bash
        run: |
          db_url="postgres://${PGUSER}:${PGPASSWORD}@${PGHOST}:${PGPORT}/${PGDATABASE}"
          echo "::add-mask::$db_url"
          case "$db_url" in
            postgres://*|postgresql://*) ;;
            *)
              echo "runner-local DATABASE_URL is malformed" >&2
              exit 1
              ;;
          esac
          echo "DATABASE_URL=$db_url" >> "$GITHUB_ENV"

      - name: Wait for runner-local Postgres
        shell: bash
        timeout-minutes: 2
        run: |
          python3 - <<'PY'
          import socket
          import time

          deadline = time.time() + 60
          while time.time() < deadline:
              with socket.socket() as sock:
                  sock.settimeout(1)
                  try:
                      sock.connect(("127.0.0.1", 5432))
                  except OSError:
                      time.sleep(1)
                  else:
                      break
          else:
              raise SystemExit("runner-local Postgres did not open 127.0.0.1:5432 within 60s")
          PY

      - name: Run authoritative starter failover proof
        id: proof
        shell: bash
        timeout-minutes: 170
        run: bash scripts/verify-m053-s02.sh

      - name: Upload starter failover diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        timeout-minutes: 5
        with:
          name: authoritative-starter-failover-proof-diagnostics
          path: .tmp/m053-s02/**
          if-no-files-found: error
          retention-days: 7
